name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    strategy:
      matrix:
        include:
          # Linux с GCC
          - os: ubuntu-latest
            compiler: gcc
            cxx: g++
            cc: gcc
          # Linux с Clang
          - os: ubuntu-latest
            compiler: clang
            cxx: clang++
            cc: clang
          # Windows (с MSVC по умолчанию)
          - os: windows-latest
            compiler: msvc
            cxx: cl
            cc: cl

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      # Установка зависимостей для Linux
      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake

      # Настройка Visual Studio для Windows
      - name: Setup Visual Studio (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      # Настройка CMake с указанием компиляторов
      - name: Configure CMake
        run: |
          cmake -B build \
            -DCMAKE_CXX_COMPILER=${{ matrix.cxx }} \
            -DCMAKE_C_COMPILER=${{ matrix.cc }}

      - name: Build
        run: cmake --build build

      # Тестирование hello_world
      - name: Test hello_world
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            ./build/hello_world/Debug/hello_world.exe
          else
            ./build/hello_world/hello_world
          fi

      # Тестирование solver
      - name: Test solver
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            echo "1 -3 2" | ./build/solver/Debug/solver.exe
          else
            echo "1 -3 2" | ./build/solver/solver
          fi
