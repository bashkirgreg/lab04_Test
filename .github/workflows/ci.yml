name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        compiler:
          - cxx: g++
            cc: gcc
          - cxx: clang++
            cc: clang
        exclude:
          - os: windows-latest
            compiler:
              cxx: clang++
              cc: clang

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Details for Linux
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y g++ clang cmake

      - name: Details for Windows
        if: runner.os == 'Windows' && matrix.compiler.cxx == 'clang++'
        run: |
          choco install llvm -y
          echo "C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: CMake
        run: |
          cmake -B build \
            -DCMAKE_CXX_COMPILER=${{ matrix.compiler.cxx }} \
            -DCMAKE_C_COMPILER=${{ matrix.compiler.cc }}

      - name: Build
        run: cmake --build build

      - name: Hello_world
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            ./build/hello_world/Debug/hello_world.exe
          else
            ./build/hello_world/hello_world
          fi

      - name: Solver
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            echo "1 5 4" | ./build/solver/Debug/solver.exe
          else
            echo "1 5 4" | ./build/solver/solver
          fi
