name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    # Матрица создает 4 варианта, но мы исключаем один (Windows + gcc),
    # чтобы остались ровно 3, как в задании.
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        compiler: [gcc, clang]
        exclude:
          - os: windows-latest
            compiler: gcc

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Устанавливаем компиляторы только для Linux. На Windows они не нужны.
      - name: Install Dependencies (Linux only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ clang

      # Настраиваем проект.
      # Для Linux явно указываем компилятор. Для Windows - нет (используем MSVC).
      - name: Configure CMake
        run: |
          mkdir build
          cd build
          if [ "${{ runner.os }}" == "Linux" ]; then
            # Этот блок выполнится только на Linux
            if [ "${{ matrix.compiler }}" == "gcc" ]; then
              cmake .. -DCMAKE_CXX_COMPILER=g++ -DCMAKE_C_COMPILER=gcc
            elif [ "${{ matrix.compiler }}" == "clang" ]; then
              cmake .. -DCMAKE_CXX_COMPILER=clang++ -DCMAKE_C_COMPILER=clang
            fi
          else
            # А этот блок выполнится только на Windows
            cmake ..
          fi

      # Собираем проект в конфигурации Release.
      # Флаг --config Release гарантирует, что файлы будут в папке 'Release'.
      - name: Build Project
        run: |
          cd build
          cmake --build . --config Release

      # Запускаем тесты. Пути к файлам ведут в папку 'Release'.
      - name: Run hello_world
        run: |
          cd build
          if [ "${{ runner.os }}" == "Windows_NT" ]; then
            .\hello_world\Release\hello_world.exe
          else
            ./hello_world/hello_world
          fi

      - name: Run solver
        run: |
          cd build
          if [ "${{ runner.os }}" == "Windows_NT" ]; then
            echo "1 -3 2" | .\solver\Release\solver.exe
          else
            echo "1 -3 2" | ./solver/solver
          fi
