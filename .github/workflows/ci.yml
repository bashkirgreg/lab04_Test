name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        compiler: [gcc, clang]
        exclude:
          - os: windows-latest
            compiler: gcc
         
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: CMake
        run: cmake -B build -DCMAKE_COMPILER=${{ matrix.compiler }} 
        
      - name: Build
        run: cmake --build build --config ${{ matrix.compiler }}
        
      - name: Hello_world
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
             ./build/hello_world/${{ matrix.compiler }}/hello_world.exe
          else
             ./build/hello_world/hello_world
          fi
        
      - name: Solver 
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
             echo "1 5 4" | ./build/solver/${{ matrix.compiler }}/solver.exe
          else
             echo "1 5 4" | ./build/solver/solver
          fi
