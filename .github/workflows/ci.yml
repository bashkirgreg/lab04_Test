name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            compiler: gcc
          - os: ubuntu-latest
            compiler: clang
          - os: windows-latest
            compiler: msvc

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Linux
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ${{ matrix.compiler == 'gcc' && 'g++' || 'clang' }}

      - name: Setup Windows
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure CMake
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Linux" ]; then
            if [ "${{ matrix.compiler }}" = "gcc" ]; then
              cmake -B build -DCMAKE_CXX_COMPILER=g++ -DCMAKE_C_COMPILER=gcc
            else
              cmake -B build -DCMAKE_CXX_COMPILER=clang++ -DCMAKE_C_COMPILER=clang
            fi
          else
            cmake -B build
          fi

      - name: Build
        run: cmake --build build

      - name: Test hello_world
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            ./build/hello_world/Debug/hello_world.exe
          else
            ./build/hello_world/hello_world
          fi

      - name: Test solver
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            echo "1 -3 2" | ./build/solver/Debug/solver.exe
          else
            echo "1 -3 2" | ./build/solver/solver
          fi
